name: release images

on:
  push:
    branches:
      - master

    tags:
      - v*

  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install stable toolchain
        id: toolchain
        uses: dtolnay/rust-toolchain@stable

      - run: rustup override set ${{steps.toolchain.outputs.name}}

      - uses: Swatinem/rust-cache@v2

      - name: Install UPX
        run: |
          curl -fsSL https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-amd64_linux.tar.xz -o upx.tar.xz
          tar -xf upx.tar.xz
          sudo mv upx-4.2.4-amd64_linux/upx /usr/local/bin/
          rm -rf upx.tar.xz upx-4.2.4-amd64_linux

      - name: Run tests
        run: |
          make images
          make test-images

  push:
    needs: test

    runs-on: ubuntu-latest

    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v7

      - name: Install stable toolchain
        id: toolchain
        uses: dtolnay/rust-toolchain@stable

      - run: rustup override set ${{steps.toolchain.outputs.name}}

      - name: Install UPX
        run: |
          curl -fsSL https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-amd64_linux.tar.xz -o upx.tar.xz
          tar -xf upx.tar.xz
          sudo mv upx-4.2.4-amd64_linux/upx /usr/local/bin/
          rm -rf upx.tar.xz upx-4.2.4-amd64_linux

      - name: Build image
        run: |
          make images

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx for multiarch images
        uses: docker/setup-buildx-action@v4

      - name: Push image
        run: |
          # Strip git ref prefix from version
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')

          # Strip "v" prefix from tag name
          [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')

          # Use Docker `latest` tag convention
          [ "$VERSION" == "master" ] && VERSION=latest

          IMAGE_VERSION=$VERSION make push-images
