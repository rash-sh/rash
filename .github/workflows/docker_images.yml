name: release images

on:
  push:
    branches:
      - master

    tags:
      - v*

  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install stable toolchain
        id: toolchain
        uses: dtolnay/rust-toolchain@stable

      - run: rustup override set ${{steps.toolchain.outputs.name}}

      - uses: Swatinem/rust-cache@v2

      - name: Install UPX
        shell: bash
        run: |
          set -euo pipefail
          UPX_VERSION="5.2.0"
          for i in 1 2 3 4 5; do
            if curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors \
              "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz" \
              -o /tmp/upx.tar.xz; then
              break
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          tar -xJf /tmp/upx.tar.xz -C /tmp
          sudo mv /tmp/upx-${UPX_VERSION}-amd64_linux/upx /usr/local/bin/upx
          upx --version

      - name: Run tests
        run: |
          make images
          make test-images

  push:
    needs: test

    runs-on: ubuntu-latest

    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v7

      - name: Install stable toolchain
        id: toolchain
        uses: dtolnay/rust-toolchain@stable

      - run: rustup override set ${{steps.toolchain.outputs.name}}

      - name: Install UPX
        shell: bash
        run: |
          set -euo pipefail
          UPX_VERSION="5.2.0"
          for i in 1 2 3 4 5; do
            if curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors \
              "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz" \
              -o /tmp/upx.tar.xz; then
              break
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          tar -xJf /tmp/upx.tar.xz -C /tmp
          sudo mv /tmp/upx-${UPX_VERSION}-amd64_linux/upx /usr/local/bin/upx
          upx --version

      - name: Build image
        run: |
          make images

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx for multiarch images
        uses: docker/setup-buildx-action@v4

      - name: Push image
        run: |
          # Strip git ref prefix from version
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')

          # Strip "v" prefix from tag name
          [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')

          # Use Docker `latest` tag convention
          [ "$VERSION" == "master" ] && VERSION=latest

          IMAGE_VERSION=$VERSION make push-images
